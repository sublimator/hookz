[paths]
xahaud = "../../../xahaud-worktrees/xahaud-wasm-coverage"
wasi_sdk = "~/.local/share/mise/installs/wasi-sdk/32/wasi-sdk"

[compile]
extra_cflags = ["-Ihooks/misc"]

[hooks]
# Genesis hooks (from Xahau/xahaud)
govern = "hooks/genesis/govern.c"
mint = "hooks/genesis/mint.c"
nftoken = "hooks/genesis/nftoken.c"
reward = "hooks/genesis/reward.c"

# Misc hooks
balance_gate = "hooks/misc/balance_gate.c"
treasury = "hooks/misc/treasury.c"

# XahauHooks101 examples (github.com/Handy4ndy/XahauHooks101)
accept_incoming_xah = "hooks/XahauHooks101/Basic_Native/Accept_Incoming_Payment/accept_incoming_xah.c"
reject_incoming_xah = "hooks/XahauHooks101/Basic_Native/Reject_Incoming_Payment/reject_incoming_xah.c"
accept_incoming_min = "hooks/XahauHooks101/Basic_Native/Accept_Incoming_Payment/accept_incoming_min.c"
reject_incoming_max = "hooks/XahauHooks101/Basic_Native/Reject_Incoming_Payment/reject_incoming_max.c"
state_counter = "hooks/XahauHooks101/Basic_State/basic_state_counter.c"
state_toggle = "hooks/XahauHooks101/Basic_State/basic_state_toggle.c"
install_param = "hooks/XahauHooks101/Basic_Install_Parameters/install_parameter_exact.c"
invoke_param = "hooks/XahauHooks101/Basic_Invoke_Parameters/invoke_parameter_exact.c"
multi_iou_remit = "hooks/XahauHooks101/Remit_IOU/invoke_multi_iou_remit.c"
multi_uri_remit = "hooks/XahauHooks101/Remit_URI/invoke_multi_uri_remit.c"
multi_invoke_emit = "hooks/XahauHooks101/Emit_Invoke/invoke_multi_invoke_emit.c"
