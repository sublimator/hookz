steps:
  # Pull conan-deps from xprv-server, or build from scratch if unavailable
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        if docker pull gcr.io/xprv-server/hookz-conan-deps:latest; then
          echo "=== Pulled conan-deps from xprv-server ==="
          docker tag gcr.io/xprv-server/hookz-conan-deps:latest hookz-conan-deps:latest
        else
          echo "=== Pull failed, building conan-deps from scratch ==="
          docker build --progress=plain \
            -t hookz-conan-deps:latest \
            -f Dockerfile.conan-deps .
        fi
    dir: docker
    id: conan-deps

  # Build runtime image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --progress=plain
      - --build-arg
      - BUILD_JOBS=16
      - -t
      - hookz-xahaud:fat
      - -f
      - Dockerfile
      - .
    dir: docker
    id: runtime
    waitFor: ['conan-deps']

  # Squash: flatten all layers into one, stripping deleted files and duplication
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        echo "=== Squashing image ==="
        CONTAINER=$(docker create hookz-xahaud:fat)
        docker export $CONTAINER | docker import \
          --change 'WORKDIR /xahaud' \
          --change 'ENV DEBIAN_FRONTEND=noninteractive' \
          --change 'ENV PATH="/root/.local/bin:${PATH}"' \
          --change 'ENV WASI_SDK_PATH=/opt/wasi-sdk' \
          --change 'ENV CCACHE_DIR=/ccache' \
          --change 'ENV CCACHE_CONFIGPATH=/root/.config/xahaud-scripts/ccache.conf' \
          --change 'ENV CCACHE_NOHASHDIR=true' \
          --change 'ENTRYPOINT ["/entrypoint.sh"]' \
          --change 'CMD ["ripple.app.SetHook"]' \
          - $_IMAGE
        docker rm $CONTAINER
        echo "=== Fat vs slim ==="
        docker images hookz-xahaud:fat --format 'fat: {{.Size}}'
        docker images $_IMAGE --format 'slim: {{.Size}}'
    id: squash
    waitFor: ['runtime']

images:
  - $_IMAGE

substitutions:
  _IMAGE: gcr.io/hookz-public/hookz-xahaud:latest

options:
  machineType: E2_HIGHCPU_32
  logging: CLOUD_LOGGING_ONLY
timeout: 7200s
