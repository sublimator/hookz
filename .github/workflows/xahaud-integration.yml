name: xahaud integration tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image to test (default: latest)"
        required: false
        default: ""

env:
  DEFAULT_IMAGE: gcr.io/hookz-public/hookz-xahaud:latest
  TIPBOT: ${{ github.workspace }}/examples/tipbot

jobs:
  integration:
    name: Run hook tests in xahaud
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ github.event.inputs.image || 'gcr.io/hookz-public/hookz-xahaud:latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pull xahaud image
        run: |
          echo "Using image: ${{ env.IMAGE }}"
          docker pull ${{ env.IMAGE }}

      - name: Run tipbot tests
        run: |
          docker run --rm \
            -v ${{ env.TIPBOT }}/env-tests:/tests \
            -v ${{ env.TIPBOT }}/hooks:/hooks/tipbot \
            -e HOOKS_TEST_DIR=/tests \
            -e HOOKS_C_DIR="tipbot=/hooks/tipbot" \
            ${{ env.IMAGE }} \
            "ripple.app.TipBot,ripple.app.TipBotClaude"
