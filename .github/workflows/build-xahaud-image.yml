name: Build xahaud image

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/sublimator/hookz-xahaud

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull previous image (for ccache seed)
        run: docker pull ${{ env.IMAGE }}:latest || true

      - name: Build conan-deps base
        run: |
          docker build \
            -t hookz-conan-deps \
            -f docker/Dockerfile.conan-deps \
            docker/

      - name: Build xahaud image
        run: |
          docker build \
            --build-arg PREV_IMAGE=${{ env.IMAGE }}:latest \
            --build-arg BUILD_JOBS=4 \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -f docker/Dockerfile \
            docker/

      - name: Push
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
