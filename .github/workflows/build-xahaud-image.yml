name: Build xahaud image

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/sublimator/hookz-xahaud
  CONAN_IMAGE: ghcr.io/sublimator/hookz-conan-deps

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull conan-deps (skip build if exists)
        id: conan
        run: |
          if docker pull ${{ env.CONAN_IMAGE }}:latest; then
            docker tag ${{ env.CONAN_IMAGE }}:latest hookz-conan-deps:latest
            echo "cached=true" >> "$GITHUB_OUTPUT"
          else
            echo "cached=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build conan-deps base
        if: steps.conan.outputs.cached != 'true'
        run: |
          docker build \
            -t hookz-conan-deps:latest \
            -t ${{ env.CONAN_IMAGE }}:latest \
            -f docker/Dockerfile.conan-deps \
            docker/

      - name: Push conan-deps
        if: steps.conan.outputs.cached != 'true'
        run: docker push ${{ env.CONAN_IMAGE }}:latest

      - name: Pull previous image (for ccache seed)
        run: docker pull ${{ env.IMAGE }}:latest || true

      - name: Build xahaud image
        run: |
          docker build \
            --build-arg PREV_IMAGE=${{ env.IMAGE }}:latest \
            --build-arg BUILD_JOBS=4 \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -f docker/Dockerfile \
            docker/

      - name: Push
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
