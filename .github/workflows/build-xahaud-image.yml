name: Build xahaud image

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/sublimator/hookz-xahaud
  CONAN_IMAGE: ghcr.io/sublimator/hookz-conan-deps

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if xahaud image already exists
        id: check
        run: |
          if docker pull ${{ env.IMAGE }}:latest; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists, nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.exists != 'true'
        with:
          fetch-depth: 1

      - name: Pull or build conan-deps
        if: steps.check.outputs.exists != 'true'
        run: |
          if docker pull ${{ env.CONAN_IMAGE }}:latest; then
            docker tag ${{ env.CONAN_IMAGE }}:latest hookz-conan-deps:latest
          else
            docker build \
              -t hookz-conan-deps:latest \
              -t ${{ env.CONAN_IMAGE }}:latest \
              -f docker/Dockerfile.conan-deps \
              docker/
            docker push ${{ env.CONAN_IMAGE }}:latest
          fi

      - name: Build xahaud image
        if: steps.check.outputs.exists != 'true'
        run: |
          docker build \
            --build-arg BUILD_JOBS=4 \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -f docker/Dockerfile \
            docker/

      - name: Push
        if: steps.check.outputs.exists != 'true'
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
